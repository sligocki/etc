<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivalent Tree BB Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Trivalent Tree BB Visualizer</h1>
        <div class="input-group">
          <input type="text" id="tm-input" value="1RA0GB_1GA0RZ" placeholder="Enter TM string (e.g. 1RA0GB_1GA0RZ)" />
          <button id="btn-load">Load TM</button>
        </div>
      </header>
      
      <main>
        <svg id="viz-canvas"></svg>
        
        <div class="overlay-panel">
          <div class="stats">
            <p>State: <span id="stat-state" class="badge">A</span></p>
            <p>Steps: <span id="stat-steps" class="badge">0</span></p>
          </div>
          
          <div class="controls">
            <button id="btn-reset">↺ Reset</button>
            <button id="btn-back">⏮ Step Back</button>
            <button id="btn-play">▶ Play</button>
            <button id="btn-forward">⏭ Step Forward</button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
